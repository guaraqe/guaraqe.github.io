<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>

  <rect x="64" y="112" width="646" height="676" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <rect x="64" y="112" width="646" height="58" rx="18" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="100" y="150" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#475569">code</text>

  <g font-family="DejaVu Sans Mono, ui-monospace, monospace" font-size="24">
    <text y="244">
      <tspan x="104" fill="#2563eb">wordCount</tspan><tspan x="242" fill="#1e293b"> = </tspan><tspan x="292" fill="#7c3aed">proc</tspan><tspan x="358" fill="#1e293b"> R {} -&gt; </tspan><tspan x="498" fill="#7c3aed">do</tspan>
    </text>
    <text y="294">
      <tspan x="132" fill="#1e293b">R {</tspan><tspan x="176" fill="#0f766e">path</tspan><tspan x="235" fill="#1e293b">} &lt;- </tspan><tspan x="310" fill="#2563eb">readPath</tspan><tspan x="432" fill="#1e293b"> -&lt; R {}</tspan>
    </text>
    <text y="344">
      <tspan x="132" fill="#1e293b">R {</tspan><tspan x="176" fill="#0f766e">text</tspan><tspan x="235" fill="#1e293b">} &lt;- </tspan><tspan x="310" fill="#2563eb">loadText</tspan><tspan x="432" fill="#1e293b"> -&lt; R {</tspan><tspan x="538" fill="#0f766e">path</tspan><tspan x="600" fill="#1e293b">}</tspan>
    </text>
    <text y="394">
      <tspan x="132" fill="#1e293b">R {</tspan><tspan x="176" fill="#0f766e">words</tspan><tspan x="250" fill="#1e293b">} &lt;- </tspan><tspan x="325" fill="#2563eb">countWords</tspan><tspan x="478" fill="#1e293b"> -&lt; R {</tspan><tspan x="582" fill="#0f766e">text</tspan><tspan x="642" fill="#1e293b">}</tspan>
    </text>
    <text y="444">
      <tspan x="132" fill="#1e293b">R {</tspan><tspan x="176" fill="#0f766e">lines</tspan><tspan x="250" fill="#1e293b">} &lt;- </tspan><tspan x="325" fill="#2563eb">countLines</tspan><tspan x="478" fill="#1e293b"> -&lt; R {</tspan><tspan x="582" fill="#0f766e">text</tspan><tspan x="642" fill="#1e293b">}</tspan>
    </text>
    <text y="494">
      <tspan x="132" fill="#1e293b">R {</tspan><tspan x="176" fill="#0f766e">chars</tspan><tspan x="250" fill="#1e293b">} &lt;- </tspan><tspan x="325" fill="#2563eb">countChars</tspan><tspan x="478" fill="#1e293b"> -&lt; R {</tspan><tspan x="582" fill="#0f766e">text</tspan><tspan x="642" fill="#1e293b">}</tspan>
    </text>
    <text y="544"><tspan x="132" fill="#2563eb">writeReport</tspan><tspan x="292" fill="#1e293b"> -&lt;</tspan></text>
    <text y="594">
      <tspan x="162" fill="#1e293b">R {</tspan><tspan x="206" fill="#0f766e">path</tspan><tspan x="264" fill="#1e293b">, </tspan><tspan x="294" fill="#0f766e">words</tspan><tspan x="368" fill="#1e293b">, </tspan><tspan x="398" fill="#0f766e">lines</tspan><tspan x="472" fill="#1e293b">, </tspan><tspan x="502" fill="#0f766e">chars</tspan><tspan x="576" fill="#1e293b">}</tspan>
    </text>
  </g>

  <line x1="710" y1="450" x2="748" y2="450" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <line x1="852" y1="450" x2="890" y2="450" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="800" cy="450" r="108" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>

  <rect x="890" y="112" width="646" height="676" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <rect x="890" y="112" width="646" height="58" rx="18" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="926" y="150" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#475569">graph</text>
</svg>
